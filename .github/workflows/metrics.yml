name: Generate Metrics

on:
  schedule:
    - cron: "0 0 * * *"
  workflow_dispatch:

jobs:
  github-metrics:
    runs-on: ubuntu-latest
    steps:
      - uses: lowlighter/metrics@latest
        with:
          # Token dengan scope repo (bisa baca private repo)
          token: ${{ secrets.METRICS_TOKEN }}

          # Identitas
          user: Farizky09
          filename: github-metrics.svg

          # Template & tema
          template: classic
          config_timezone: Asia/Jakarta
          config_padding: 6%, 10%

          # Base sections — include semua aktivitas termasuk private
          base: header, activity, community, repositories, metadata
          base_indepth: true              # scan lebih dalam ke semua repo
          repositories_visibility: all   # public + private (nama tidak ditampilkan)
          repositories_affiliations: owner, collaborator, organization_member

          # Commit stats — hitung private commit juga
          base_hireable: false
          commits_authoring: Farizky09

          # Plugin: Languages (dari semua repo termasuk private)
          plugin_languages: yes
          plugin_languages_ignored: >-
            html, css, tex, less, dockerfile, makefile,
            shell, gnuplot
          plugin_languages_analysis_timeout: 30
          plugin_languages_categories: markup, programming
          plugin_languages_colors: github
          plugin_languages_limit: 8
          plugin_languages_recent_categories: markup, programming
          plugin_languages_recent_days: 14
          plugin_languages_recent_load: 300
          plugin_languages_sections: most-used
          plugin_languages_threshold: 0%
          plugin_languages_indepth: true   # scan private repo untuk bahasa

          # Plugin: Activity
          plugin_activity: yes
          plugin_activity_limit: 5
          plugin_activity_days: 14
          plugin_activity_filter: all
          plugin_activity_visibility: all  # tampilkan aktivitas private juga

          # Plugin: Stars
          plugin_stars: yes
          plugin_stars_limit: 4

          # Plugin: Habits
          plugin_habits: yes
          plugin_habits_from: 200
          plugin_habits_days: 14
          plugin_habits_facts: yes
          plugin_habits_charts: yes
          plugin_habits_trim: yes
          plugin_habits_charts_type: classic
