name: Generate Snake

on:
  schedule:
    - cron: "0 0 * * *"
  workflow_dispatch:

jobs:
  snake:
    runs-on: ubuntu-latest
    steps:
      - uses: Platane/snk@v3
        with:
          github_user_name: Farizky09
          github_token: ${{ secrets.GITHUB_TOKEN }}
          outputs: |
            dist/github-contribution-grid-snake.svg?color_snake=7C3AED&color_dots=#0d1117,#1a1a2e,#4a0080,#7C3AED,#9d4edd&mode=dodge
            dist/github-contribution-grid-snake-dark.svg?palette=github-dark&color_snake=7C3AED&color_dots=#0d1117,#1a1a2e,#4a0080,#7C3AED,#9d4edd&mode=dodge

      - uses: crazy-max/ghaction-github-pages@v4
        with:
          target_branch: output
          build_dir: dist
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
